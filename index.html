<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
  --ink:#10131a;--paper:#f5f1e8;--gold:#c08a1e;--rust:#b03a2e;
  --sage:#2d6a4f;--slate:#2c4a6e;--violet:#5c4a8a;--warm:#8c7355;
  --light:#ece6d8;--border:#d4c9b0;--shadow:rgba(16,19,26,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink)}
.shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:320px;flex-shrink:0;
  background:var(--ink);color:#ddd5c0;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:4px 0 20px rgba(0,0,0,.35);
  z-index:10;
}
.head{padding:20px 18px 14px;border-bottom:1px solid #1d2233}
.head h1{font-family:'Lora',serif;font-size:20px;line-height:1.25;color:#f0e8d4}
.head h1 em{font-style:italic;color:var(--gold)}
.head p{font-size:10.5px;color:#6e6450;margin-top:5px;letter-spacing:.03em}

/* ── FILTROS ── */
.filters{padding:12px 18px;border-bottom:1px solid #1d2233}
.f-label{font-size:9.5px;font-weight:600;letter-spacing:.08em;color:#5a5040;text-transform:uppercase;display:block;margin-bottom:7px}
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.pill{
  font-size:10.5px;padding:3px 10px;border-radius:20px;
  border:1px solid #252b3a;background:transparent;color:#8a7e6a;
  cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;
}
.pill:hover{border-color:#5a5040;color:#c8bca0}
.pill.on{border-color:transparent;color:#fff;font-weight:500}
.p-all.on   {background:var(--warm)}
.p-pub.on   {background:var(--sage)}
.p-lai.on   {background:var(--slate)}
.p-rel.on   {background:var(--violet)}
.p-ib.on    {background:var(--gold)}
.p-war.on   {background:#c07020}
.p-nor.on   {background:#3a6a5a}
.p-cen.on   {background:#4a5a3a}
.p-sur.on   {background:var(--rust)}
.search{
  width:100%;background:#181d2a;border:1px solid #252b3a;
  color:#c8bca0;font-family:'DM Sans',sans-serif;font-size:12px;
  padding:7px 10px;border-radius:6px;outline:none;transition:border .15s;margin-top:8px;
}
.search::placeholder{color:#3e3a30}
.search:focus{border-color:var(--gold)}

/* ── LISTA ── */
.list-hd{
  padding:8px 18px;font-size:9.5px;font-weight:600;
  letter-spacing:.08em;color:#5a5040;text-transform:uppercase;
  border-bottom:1px solid #1d2233;
  display:flex;justify-content:space-between;align-items:center;
}
.badge{
  background:var(--gold);color:#10131a;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;
}
.list{flex:1;overflow-y:auto}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-track{background:transparent}
.list::-webkit-scrollbar-thumb{background:#252b3a;border-radius:2px}
.li{
  padding:9px 18px;border-bottom:1px solid #181d2a;
  cursor:pointer;transition:background .1s;
}
.li:hover{background:#181d2a}
.li.active{background:#1c2235;border-left:3px solid var(--gold);padding-left:15px}
.li-name{font-size:11.5px;font-weight:500;color:#d0c4ae;line-height:1.3}
.li-meta{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center}
.li-dist{font-size:10px;color:#5a5040}
.li-price{font-size:10px;color:#8a7e6a;margin-left:auto}
.tag{font-size:8.5px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.t-pub{background:#0d2a1a;color:#5ec97a}
.t-lai{background:#0d1e35;color:#5a9fd8}
.t-rel{background:#1e1030;color:#b07ad8}
.t-ib {background:#2a1800;color:#d4a030}
.t-war{background:#2a1200;color:#e07828}

/* ── MAPA ── */
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}

/* ── LEYENDA ── */
.legend{
  position:absolute;bottom:18px;right:12px;z-index:999;
  background:rgba(16,19,26,.93);backdrop-filter:blur(10px);
  border:1px solid #252b3a;border-radius:10px;
  padding:12px 14px;color:#c8bca0;font-size:11px;
  box-shadow:0 4px 24px rgba(0,0,0,.45);min-width:170px;
}
.leg-title{font-family:'Lora',serif;font-size:13px;color:#f0e8d4;margin-bottom:9px}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.leg-hr{border:none;border-top:1px solid #252b3a;margin:6px 0}
.vis{color:var(--gold);font-weight:600;font-size:10.5px}

/* ── POPUP ── */
.leaflet-popup-content-wrapper{
  background:#10131a;border:1px solid #252b3a;border-radius:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);padding:0;overflow:hidden;
}
.leaflet-popup-content{margin:0;min-width:260px;max-width:320px}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-close-button{color:#5a5040!important;top:8px!important;right:8px!important;font-size:16px!important}
.pop{font-family:'DM Sans',sans-serif}
.pop-head{padding:13px 15px 9px;border-bottom:1px solid #1d2233}
.pop-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;color:#fff;margin-right:7px;vertical-align:middle;flex-shrink:0}
.pop-name{font-size:13px;font-weight:600;color:#f0e8d4;line-height:1.3}
.pop-dist{font-size:10px;color:#5a5040;margin-top:2px}
.pop-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.pop-body{padding:9px 15px 12px}
.pop-row{display:flex;justify-content:space-between;gap:8px;padding:4px 0;border-bottom:1px solid #1a1f2e;font-size:11px}
.pop-row:last-child{border:none}
.pop-lbl{color:#5a5040;flex-shrink:0}
.pop-val{color:#c8bca0;text-align:right;line-height:1.3}
.pop-note{margin-top:7px;font-size:10px;color:#5a5040;font-style:italic;line-height:1.4;padding-top:6px;border-top:1px solid #1a1f2e}
.pop-web{
  display:block;margin:8px 15px 12px;
  background:#1a1f2e;border:1px solid #252b3a;
  border-radius:6px;padding:6px 10px;
  font-size:10.5px;color:var(--gold);text-decoration:none;
  text-align:center;transition:background .15s;
}
.pop-web:hover{background:#252b3a;color:#e0b040}

/* mobile */
@media(max-width:640px){
  .sidebar{width:100%;height:42vh;flex-direction:column}
  .shell{flex-direction:column}
  .map-wrap{height:58vh}
  .legend{display:none}
}
</style>
</head>

// ════════════════════════════════════
//  MAPA LEAFLET
// ════════════════════════════════════
const map = L.map('map',{zoomControl:false}).setView([-12.09,-77.01],11);
L.control.zoom({position:'topright'}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  maxZoom:19, subdomains:'abcd'
}).addTo(map);

// ── marker factory ──
function mkIcon(color,num,size=30){
  const r=size/2;
  const h=Math.round(size*1.3);
  const svg=`<svg width="${size}" height="${h}" viewBox="0 0 ${size} ${h}" xmlns="http://www.w3.org/2000/svg">
    <path d="M${r} 0C${r*.4} 0 0 ${r*.4} 0 ${r}c0 ${r*1.5} ${r} ${r*2} ${r} ${r*2}S${size} ${r*2.5} ${size} ${r}C${size} ${r*.4} ${r*1.6} 0 ${r} 0z" fill="${color}" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="${r}" y="${r*1.15}" text-anchor="middle" font-size="${size*.33}px" font-weight="700" fill="white" font-family="DM Sans,sans-serif">${num}</text>
  </svg>`;
  return L.divIcon({className:'',html:svg,iconSize:[size,h],iconAnchor:[r,h],popupAnchor:[0,-h]});
}

// ── popup builder ──
function mkPop(c){
  const aColor = c.tipo==='pub'?'#5ec97a':c.tipo==='rel'?'#b07ad8':'#5a9fd8';
  const tags=[
    `<span class="tag" style="background:${aColor}18;color:${aColor}">${c.afil}</span>`,
    c.ib  ? `<span class="tag t-ib">IB</span>` :'',
    c.war ? `<span class="tag t-war">⚠ precio</span>`:''
  ].filter(Boolean).join('');
  return `<div class="pop">
    <div class="pop-head">
      <span class="pop-badge" style="background:${c.color}">${c.id}</span>
      <span class="pop-name">${c.n}</span>
      <div class="pop-dist">📍 ${c.dist}</div>
      <div class="pop-tags">${tags}</div>
    </div>
    <div class="pop-body">
      <div class="pop-row"><span class="pop-lbl">Inicial</span><span class="pop-val">${c.ini}</span></div>
      <div class="pop-row"><span class="pop-lbl">Primaria</span><span class="pop-val">${c.pri}</span></div>
      <div class="pop-row"><span class="pop-lbl">Ingreso</span><span class="pop-val">${c.ing}</span></div>
      <div class="pop-row"><span class="pop-lbl">STEM</span><span class="pop-val">${c.stem}</span></div>
      ${c.nota?`<p class="pop-note">${c.nota}</p>`:''}
    </div>
    <a class="pop-web" href="${c.web}" target="_blank" rel="noopener">🌐 Visitar sitio web oficial</a>
  </div>`;
}

// ── estado ──
let activeFilt='all', activeZona=null, activeQ='';
let mks=[];

function render(){
  mks.forEach(m=>map.removeLayer(m.mk));
  mks=[];
  const listEl=document.getElementById('list');
  listEl.innerHTML='';
  const q=activeQ.toLowerCase();
  let vis=0;

  D.forEach(c=>{
    // filtro tipo
    const matchF=(
      activeFilt==='all' ||
      (activeFilt==='pub'  && c.tipo==='pub') ||
      (activeFilt==='lai'  && c.tipo==='lai') ||
      (activeFilt==='rel'  && c.tipo==='rel') ||
      (activeFilt==='ib'   && c.ib) ||
      (activeFilt==='war'  && c.war)
    );
    // filtro zona
    const matchZ=(!activeZona || c.zona===activeZona);
    // búsqueda
    const matchQ=(!q||c.n.toLowerCase().includes(q)||c.dist.toLowerCase().includes(q)||c.afil.toLowerCase().includes(q));

    if(!matchF||!matchZ||!matchQ) return;
    vis++;

    const mk=L.marker([c.lat,c.lng],{icon:mkIcon(c.color,c.id)})
      .addTo(map)
      .bindPopup(mkPop(c),{maxWidth:330,className:''});
    mks.push({mk,id:c.id});

    // item lista
    const div=document.createElement('div');
    div.className='li'; div.id=`li${c.id}`;
    const ibTag=c.ib?`<span class="tag t-ib">IB</span>`:'';
    const wTag=c.war?`<span class="tag t-war">⚠</span>`:'';
    const tTag=c.tipo==='pub'?`<span class="tag t-pub">PUB</span>`:
               c.tipo==='rel'?`<span class="tag t-rel">REL</span>`:
                              `<span class="tag t-lai">LAI</span>`;
    div.innerHTML=`<div class="li-name">${c.id}. ${c.n}</div>
      <div class="li-meta">
        <span class="li-dist">${c.dist}</span>
        ${tTag}${ibTag}${wTag}
        <span class="li-price">${c.pri}</span>
      </div>`;
    div.addEventListener('click',()=>{
      map.setView([c.lat,c.lng],15,{animate:true});
      mk.openPopup();
      document.querySelectorAll('.li').forEach(el=>el.classList.remove('active'));
      div.classList.add('active');
    });
    listEl.appendChild(div);

    mk.on('click',()=>{
      document.querySelectorAll('.li').forEach(el=>el.classList.remove('active'));
      const li=document.getElementById(`li${c.id}`);
      if(li){li.classList.add('active');li.scrollIntoView({behavior:'smooth',block:'nearest'});}
    });
  });

  document.getElementById('cnt').textContent=vis;
  document.getElementById('vis').textContent=`${vis} visible${vis!==1?'s':''}`;
}

// ── listeners tipo ──
document.querySelectorAll('#pills-tipo .pill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#pills-tipo .pill').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeFilt=btn.dataset.f;
    render();
  });
});

// ── listeners zona (toggle) ──
document.querySelectorAll('#pills-zona .pill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(activeZona===btn.dataset.z){
      btn.classList.remove('on');
      activeZona=null;
    } else {
      document.querySelectorAll('#pills-zona .pill').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      activeZona=btn.dataset.z;
    }
    render();
  });
});

document.getElementById('q').addEventListener('input',e=>{
  activeQ=e.target.value;render();
});

render();
</script>
